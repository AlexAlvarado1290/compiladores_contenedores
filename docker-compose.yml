services:
  db:
    image: postgres:16-alpine
    container_name: pasteleria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - pasteleria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pasteleria_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      APP_PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pasteleria_net
    expose:
      - "8000"

  proxy:
    image: nginx:1.27-alpine
    container_name: pasteleria_proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8080}:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - proxy_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - pasteleria_net

networks:
  pasteleria_net:
    driver: bridge
    name: pasteleria_net

volumes:
  db_data:
    name: pasteleria_db_data
  proxy_logs:
    name: pasteleria_proxy_logs
